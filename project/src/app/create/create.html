<section class="create-car">
  <div class="form-container">
    <h1>Add New Car</h1>

    <form [formGroup]="createForm" (ngSubmit)="onCreate()">
      <div class="form-group">
        <label for="brand">Brand</label>
        <input type="text" id="brand" formControlName="brand" placeholder="BMW, Audi...">
      </div>

      <div class="form-group">
        <label for="model">Model</label>
        <input type="text" id="model" formControlName="model" placeholder="M3, A4...">
      </div>
      <div class="form-group">
        <label for="year">Year</label>
        <input type="number" id="year" formControlName="year" placeholder="2020">
      </div>

      <div class="form-group">
        <label for="image">Image URL</label>
        <input type="text" id="image" formControlName="image" placeholder="https://...">
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" formControlName="description" rows="6" placeholder="Car details..."></textarea>
      </div>
       <div class="form-group">
        <label for="tags">Tags</label>
        <input
          type="text"
          id="tags"
          formControlName="tags"
          placeholder="e.g., sports, electric, luxury"
        />
      </div>

      <button type="submit" class="btn-submit">Create Car</button>
    </form>
  </div>
</section>
